<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>澳洲雇主担保移民评估 - Sunwood Consulting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #e8ecf1 100%);
            min-height: 100vh;
            color: #1e3a5f;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* 顶部品牌区 */
        .brand-header {
            background: white;
            border-radius: 16px;
            padding: 40px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(30, 58, 95, 0.08);
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .brand-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #1e3a5f 0%, #c9a227 50%, #1e3a5f 100%);
        }
        
        .brand-name {
            font-size: 32px;
            font-weight: 700;
            color: #1e3a5f;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        
        .brand-subtitle {
            font-size: 14px;
            color: #c9a227;
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 24px;
        }
        
        .service-title {
            font-size: 24px;
            color: #1e3a5f;
            margin-bottom: 12px;
            font-weight: 600;
        }
        
        .service-tagline {
            font-size: 16px;
            color: #5a6c7d;
            font-style: italic;
        }
        
        .contact-info {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e8ecf1;
            font-size: 14px;
            color: #5a6c7d;
        }
        
        .contact-info a {
            color: #1e3a5f;
            text-decoration: none;
            font-weight: 600;
        }
        
        /* 表单标题区 */
        .form-header {
            background: white;
            border-radius: 12px;
            padding: 30px 40px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(30, 58, 95, 0.06);
        }
        
        .form-title {
            font-size: 22px;
            color: #1e3a5f;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .form-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(180deg, #c9a227 0%, #1e3a5f 100%);
            border-radius: 2px;
        }
        
        .form-desc {
            color: #5a6c7d;
            font-size: 14px;
            line-height: 1.6;
        }
        
        /* 表单容器 */
        .form-container {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 24px rgba(30, 58, 95, 0.1);
        }
        
        iframe {
            width: 100%;
            border: none;
            display: block;
        }
        
        /* 底部 */
        .footer {
            text-align: center;
            padding: 30px;
            color: #8a9aac;
            font-size: 12px;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }
            
            .brand-header {
                padding: 30px 20px;
            }
            
            .brand-name {
                font-size: 24px;
            }
            
            .form-header {
                padding: 20px;
            }
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">

            <div class="contact-info">
                📞 <a href="tel:+61398191111">(03) 9819 1111</a> |

        <div class="form-container">

        <!-- 底部 -->
        <div class="footer">

        </div>

</body>

</html>
